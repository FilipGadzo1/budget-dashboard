<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none">
  <!-- Body -->
  <ellipse cx="280" cy="270" rx="120" ry="75" fill="currentColor" transform="rotate(-8 280 270)"/>

  <!-- Rump / hindquarters bump -->
  <ellipse cx="370" cy="240" rx="60" ry="52" fill="currentColor"/>

  <!-- Neck -->
  <path d="M 185 235 C 175 190 185 150 205 130 C 220 115 245 120 250 145 C 255 168 245 200 235 220 Z"
        fill="currentColor"/>

  <!-- Head -->
  <ellipse cx="215" cy="115" rx="40" ry="32" fill="currentColor" transform="rotate(-20 215 115)"/>

  <!-- Snout -->
  <ellipse cx="190" cy="118" rx="22" ry="16" fill="currentColor" transform="rotate(-20 190 118)"/>

  <!-- Horn -->
  <path d="M 196 78 L 175 18 L 218 70 Z" fill="currentColor"/>
  <!-- Horn shine -->
  <path d="M 196 78 L 178 28 L 188 75 Z" fill="white" opacity="0.4"/>

  <!-- Eye -->
  <circle cx="205" cy="105" r="5" fill="white" opacity="0.9"/>
  <circle cx="206" cy="105" r="2.5" fill="currentColor" opacity="0.5"/>

  <!-- Nostril -->
  <ellipse cx="178" cy="122" rx="4" ry="2.5" fill="white" opacity="0.3" transform="rotate(-20 178 122)"/>

  <!-- Ear -->
  <path d="M 225 88 L 232 65 L 245 82 Z" fill="currentColor"/>
  <path d="M 228 86 L 233 70 L 242 82 Z" fill="white" opacity="0.3"/>

  <!-- Front legs -->
  <rect x="195" y="322" width="22" height="80" rx="10" fill="currentColor"/>
  <rect x="235" y="330" width="22" height="75" rx="10" fill="currentColor"/>

  <!-- Back legs -->
  <rect x="305" y="322" width="22" height="80" rx="10" fill="currentColor"/>
  <rect x="345" y="330" width="22" height="75" rx="10" fill="currentColor"/>

  <!-- Hooves -->
  <rect x="193" y="392" width="26" height="12" rx="6" fill="currentColor" opacity="0.7"/>
  <rect x="233" y="396" width="26" height="12" rx="6" fill="currentColor" opacity="0.7"/>
  <rect x="303" y="392" width="26" height="12" rx="6" fill="currentColor" opacity="0.7"/>
  <rect x="343" y="396" width="26" height="12" rx="6" fill="currentColor" opacity="0.7"/>

  <!-- Tail — flowing curves -->
  <path d="M 392 255 C 440 230 470 260 455 305 C 442 342 410 355 400 335 C 388 312 415 290 425 310"
        stroke="currentColor" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M 392 255 C 450 215 480 240 465 285"
        stroke="currentColor" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Mane — flowing along neck -->
  <path d="M 218 95 C 200 115 188 140 185 170 C 183 192 188 210 195 228"
        stroke="currentColor" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M 228 92 C 212 112 202 138 200 165 C 198 185 203 205 210 222"
        stroke="currentColor" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 238 96 C 224 116 216 142 215 168"
        stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Small stars / sparkles around horn -->
  <text x="155" y="55" font-size="18" fill="currentColor" opacity="0.7">✦</text>
  <text x="225" y="30" font-size="12" fill="currentColor" opacity="0.5">✧</text>
  <text x="245" y="60" font-size="10" fill="currentColor" opacity="0.4">⋆</text>
</svg>
